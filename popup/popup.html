<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSS Bridge — Настройки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #c8892a;
      --gold-dim: rgba(200,137,42,0.55);
      --gold-sub: rgba(200,137,42,0.3);
      --bg:       #0d0600;
      --bg-card:  #140800;
      --border:   rgba(90,53,16,0.7);
      --text:     #e8d4a8;
      --text-dim: rgba(232,212,168,0.55);
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1c0c00 0%, var(--bg-card) 100%);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      font-size: 22px;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(200,137,42,0.5);
    }
    .header-text {}
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .header-sub {
      font-size: 12px;
      color: var(--gold-dim);
      font-style: italic;
    }

    /* ── Sections ── */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }

    /* ── Token status ── */
    .token-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(200,137,42,0.06);
      border: 1px solid var(--gold-sub);
      border-radius: 8px;
    }
    .token-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .token-dot.ok      { background: #4caf7d; box-shadow: 0 0 6px rgba(76,175,125,0.6); }
    .token-dot.err     { background: #e05050; box-shadow: 0 0 6px rgba(220,80,80,0.5); }
    .token-dot.loading { background: var(--gold); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .token-text {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      flex: 1;
    }

    /* ── Inputs ── */
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 11px;
      color: var(--gold-dim);
      margin-bottom: 4px;
      display: block;
    }

    .field input {
      width: 100%;
      background: rgba(200,137,42,0.06);
      border: 1px solid rgba(200,137,42,0.25);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus {
      border-color: var(--gold);
      background: rgba(200,137,42,0.1);
    }
    .field input::placeholder { color: rgba(200,137,42,0.25); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    .btn-save {
      background: linear-gradient(135deg, #7a4a10 0%, #c8892a 100%);
      color: #fff8ee;
      box-shadow: 0 2px 10px rgba(200,137,42,0.25);
    }
    .btn-save:hover {
      background: linear-gradient(135deg, #9a5f15 0%, #e0a040 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200,137,42,0.4);
    }
    .btn-save:active { transform: translateY(0); }

    .btn-check {
      background: rgba(200,137,42,0.08);
      color: var(--gold);
      border: 1px solid rgba(200,137,42,0.3);
      margin-top: 8px;
    }
    .btn-check:hover {
      background: rgba(200,137,42,0.14);
      border-color: var(--gold);
    }

    /* ── Save feedback ── */
    .save-msg {
      text-align: center;
      font-size: 12px;
      font-style: italic;
      margin-top: 8px;
      height: 16px;
      transition: opacity 0.3s;
      color: #7dde8a;
    }
    .save-msg.hidden { opacity: 0; }

    /* ── Footer ── */
    .footer {
      padding: 10px 20px;
      background: rgba(0,0,0,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-ver {
      font-size: 10px;
      color: rgba(200,137,42,0.3);
      font-family: monospace;
    }
    .footer-link {
      font-size: 11px;
      color: var(--gold-dim);
      text-decoration: none;
      font-style: italic;
    }
    .footer-link:hover { color: var(--gold); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🐛</div>
    <div class="header-text">
      <div class="header-title">Anal Carnival Tools</div>
      <div class="header-sub">Абсолют Синема решения </div>
      <div class="header-sub">для Абсолют Синема сервиса</div>
    </div>
  </div>

  <!-- Статус LSS токена -->
  <div class="section">
    <div class="section-label">LSS Авторизация</div>
    <div class="token-status">
      <div class="token-dot loading" id="token-dot"></div>
      <span class="token-text" id="token-text">Проверка...</span>
    </div>
    <button class="btn btn-check" id="check-token-btn">↺ Проверить токен</button>
  </div>

  <!-- URL вашего сервера -->
  <div class="section" hidden="true">
    <button class="btn btn-save" id="save-btn">
      <span>✓</span> Сохранить
    </button>
    <div class="save-msg hidden" id="save-msg">Настройки сохранены!</div>
  </div>

  <div class="footer">
    <span class="footer-ver">v1.2.2</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
